            <div class="collapse navbar-collapse" id="collapsibleNavbar">

        </nav>
      </header>
      <section>
        <div class="row">
          <div class="col-md-6 p-5 bg-white text-black">
            <div class="container mt-3">
              <h2>Registro</h2>
              <form action="#">
                <div class="mb-3 mt-3">
                  <label for="reg-name" class="form-label"
                    >Nombre y Apellido</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="reg-name"
                    placeholder="Ingrese Nombre y Apellido"
                    name="username"
                  />
                </div>
                <div class="mb-3">
                  <label for="reg-email" class="form-label"
                    >Correo electrónico:</label
                  >
                  <input
                    type="email"
                    class="form-control"
                    id="reg-email"
                    placeholder="Ingrese Correo"
                    name="email"
                  />
                </div>
                <div class="mb-3">
                  <label for="reg-pwd" class="form-label">Contraseña:</label>
                  <input
                    type="password"
                    class="form-control"
                    id="reg-pwd"
                    placeholder="Ingrese Contraseña"
                    name="pswd"
                  />
                </div>
                <div class="mb-3">
                  <label for="reg-date" class="form-label"
                    >Fecha nacimiento:</label
                  >
                  <input
                    type="date"
                    class="form-control"
                    id="reg-date"
                    placeholder="Ingrese Fecha"
                    name="birthdate"
                  />
                </div>
                <div class="form-check mb-3">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    name="Acuerdate"
                    id="remember-reg"
                  />
                  <label class="form-check-label" for="remember-reg"
                    >Acuerdate de mi</label
                  >
                </div>
                <button type="submit" class="btn btn-primary">Entregar</button>
              </form>
            </div>
          </div>

          <div class="col-md-6 p-5 bg-white text-black">
            <div class="container mt-3">
              <h2>Iniciar sesion</h2>
              <form action="#">
                <div class="mb-3 mt-3">
                  <label for="login-email" class="form-label"
                    >Correo electrónico:</label
                  >
                  <input
                    type="email"
                    class="form-control"
                    id="login-email"
                    placeholder="Ingrese Correo"
                    name="email"
                  />
                </div>
                <div class="mb-3">
                  <label for="login-pwd" class="form-label">Contraseña:</label>
                  <input
                    type="password"
                    class="form-control"
                    id="login-pwd"
                    placeholder="Ingrese Contraseña"
                    name="pswd"
                  />
                </div>
                <div class="form-check mb-3">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    name="Acuerdate"
                    id="remember-login"
                  />
                  <label class="form-check-label" for="remember-login"
                    >Acuerdate de mi</label
                  >
                </div>
                <button type="submit" class="btn btn-primary">Entregar</button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </div>
    <footer class="bg-dark text-white text-center p-3">
